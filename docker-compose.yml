services:
  trmnl-server:
    image: stvasyl/trmnl-server-go:latest
    container_name: trmnl-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - trmnl-data:/data
      - ./config.yaml:/config/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  trmnl-data:
